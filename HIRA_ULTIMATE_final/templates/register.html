<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - HIRA Ultimate</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">

    <div class="register-container">
        <div class="header-section">
            <div class="logo" style="justify-content: center; margin-bottom: 12px;">
                <div class="logo-icon" style="width: 32px; height: 32px;">
                    <i data-lucide="activity" style="width: 20px; height: 20px;"></i>
                </div>
                <span class="brand" style="font-size: 1rem;">HIRA ULTIMATE</span>
            </div>
            <h1>Create Account</h1>
            <p>Join HIRA to analyze reports with AI assistance.</p>
        </div>

        <form class="register-form" id="registerForm" action="{{ url_for('register') }}" method="POST">
            
            <div class="form-group">
                <label class="form-label">I am a...</label>
                <div class="role-selection">
                    <div class="role-card">
                        <input type="radio" name="role" id="role-patient" value="patient" checked>
                        <div class="role-content">
                            <i data-lucide="user" class="role-icon"></i>
                            <span class="role-title">Patient</span>
                        </div>
                    </div>
                    <div class="role-card">
                        <input type="radio" name="role" id="role-doctor" value="doctor">
                        <div class="role-content">
                            <i data-lucide="stethoscope" class="role-icon"></i>
                            <span class="role-title">Doctor</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="fullname" class="form-label">Full Name</label>
                <div class="input-wrapper">
                    <i data-lucide="smile" class="input-icon"></i>
                    <input type="text" id="fullname" name="fullname" class="form-input" placeholder="e.g. John Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label for="dob" class="form-label">Date of Birth</label>
                <div class="input-wrapper">
                    <i data-lucide="calendar" class="input-icon"></i>
                    <input type="date" id="dob" name="dob" class="form-input" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" name="email" class="form-input" placeholder="john@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">Phone</label>
                    <div class="input-wrapper">
                        <i data-lucide="phone" class="input-icon"></i>
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="+1 (555) 000-0000" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required>
                </div>
            </div>

            <div class="checkbox-group" style="display: flex; gap: 12px; align-items: flex-start; margin-top: 8px;">
                <input type="checkbox" id="consent" required style="margin-top: 4px;">
                <label for="consent" style="font-size: 0.875rem; color: var(--text-medium); line-height: 1.4; cursor: pointer;">
                    I consent to upload data for <strong>academic/demo purposes</strong> only. I understand this system is not for clinical diagnosis.
                </label>
            </div>

            <button type="submit" class="btn-submit" style="margin-top: 16px;">
                Register Account <i data-lucide="user-plus" style="width: 18px; height: 18px;"></i>
            </button>
        </form>

        <div class="card-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        // JavaScript submission handler removed to allow standard POST submission
    </script>
</body>
</html>
